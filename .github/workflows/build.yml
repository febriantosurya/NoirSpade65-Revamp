name: Build Spade 65

on:
  push:
    branches: [master, main]
    paths:
      - 'keyboards/brian70/spade_65/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'keyboards/brian70/spade_65/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Install QMK CLI
        run: pip3 install --upgrade qmk

      - name: Configure QMK home
        run: qmk config user.qmk_home="$(pwd)"

      - name: Build firmware
        run: qmk compile -kb brian70/spade_65 -km default

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brian70_spade_65_default
          path: |
            .build/brian70_spade_65_default.bin
            .build/brian70_spade_65_default.hex
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: brian70_spade_65_default
          path: firmware

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +%Y.%m.%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            firmware/brian70_spade_65_default.bin
            firmware/brian70_spade_65_default.hex
